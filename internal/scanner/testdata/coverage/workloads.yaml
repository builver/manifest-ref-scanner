---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: nginx
          image: nginx:1.25.0
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-agent
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: agent
          image: fluent/fluent-bit:3.0.0
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: migrate
          image: ghcr.io/example/migrator:v1.0.0
---
apiVersion: v1
kind: Pod
metadata:
  name: debug
  namespace: default
spec:
  containers:
    - name: debug
      image: busybox:1.36
