apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: my-chart
  namespace: default
spec:
  interval: 1h
  url: oci://ghcr.io/example/charts/my-app
  ref:
    tag: v1.2.3
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: my-app
  namespace: default
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: my-chart
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: versioned-chart
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/example/charts/versioned
  ref:
    semver: ">=1.0.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: versioned-app
  namespace: flux-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: versioned-chart
