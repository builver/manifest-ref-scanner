apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: components
  namespace: flux-system
spec:
  inputs:
    - env: "staging"
  resources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: app-<< inputs.env >>
        namespace: flux-system
      spec:
        interval: 1h
        sourceRef:
          kind: OCIRepository
          name: flux-system
        path: ./apps/<< inputs.env >>
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: inline-chart
        namespace: flux-system
      spec:
        interval: 1h
        url: oci://ghcr.io/example/inline-chart
        ref:
          tag: v3.0.0
