apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ocirepository.yaml
patches:
  - patch: |-
      - op: replace
        path: /spec/ref/tag
        value: v9.9.9-patched
    target:
      kind: OCIRepository
      name: kustomize-built


helmCharts:
- name: crossplane
  repo: https://charts.crossplane.io/stable
  version: "v2.3.2"
  releaseName: crossplane
  namespace: crossplane-system
  includeCRDs: true