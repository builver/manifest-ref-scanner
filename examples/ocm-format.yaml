# Custom format config that reproduces the built-in "ocm" format.
# Use as a starting point for customizing OCM component constructor output.
# See: https://ocm.software/docs/getting-started/create-component-version/
#
# Usage:
#   manifest-ref-scanner ./gitops \
#     --format-config examples/ocm-format.yaml \
#     --arg component=github.com/acme/my-app \
#     --arg version=1.0.0 \
#     --arg provider=acme.org

args:
  component: ""   # required: OCM component name, e.g. github.com/acme/my-app
  version: ""     # required: component version, e.g. 1.0.0
  provider: ""    # optional: provider name; defaults to "unknown"

template: |
  components:
  - name: {{ required "component" .Args.component }}
    version: "{{ required "version" .Args.version }}"
    provider:
      name: {{ default "unknown" .Args.provider }}
    resources:
  {{- range uniqueByRaw .Artifacts }}
    - name: {{ if .Repository }}{{ sanitizeName .Repository }}{{ else }}{{ sanitizeName .Reference }}{{ end }}
      type: ociImage
      version: "{{ or .Tag .Digest "unknown" }}"
      access:
        type: ociArtifact
        imageReference: {{ trimPrefix "oci://" .Reference }}
  {{- end }}
